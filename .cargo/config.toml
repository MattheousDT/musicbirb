[alias]
dist = "run --package ffi --bin dist --"

[target.aarch64-apple-ios]
rustflags = [
    "-C", "link-arg=-Wl,-platform_version,ios,17.0,17.0",
]

[target.aarch64-apple-ios-sim]
rustflags = [
    "-C", "link-arg=-Wl,-platform_version,ios-simulator,17.0,17.0",
    "-C", "link-arg=-mios-simulator-version-min=17.0",
]
